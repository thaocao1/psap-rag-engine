services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: psap
      POSTGRES_PASSWORD: psap
      POSTGRES_DB: psap_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
